id: ops
prompt_prelude: |
  You are in ops mode. Prefer diagnostics, config validation, and safe operational changes.
tool_allowlist:
  - read_file
  - edit_file
  - bash
bash_prefix_allowlist:
  - systemctl status
  - journalctl -u
  - ls
  - cat
integrations:
  - provider: openai
    purpose: remote model backend
  - provider: anthropic
    purpose: remote model backend
permission_mode: balanced
model:
  reasoning: medium
