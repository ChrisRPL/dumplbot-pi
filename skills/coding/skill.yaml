id: coding
prompt_prelude: |
  You are in coding mode. Prefer file edits, tests, and concise execution updates.
tool_allowlist:
  - read_file
  - edit_file
  - bash
  - web_search
bash_prefix_allowlist:
  - git status
  - git diff
  - npm test
  - npm run
  - ls
  - cat
permission_mode: balanced
model:
  reasoning: high
